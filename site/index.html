<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horror Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header"></div>
  <main class="page">
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-copy">
          <div class="hero-note" id="heroNote"></div>
          <h1 class="hero-title" id="heroTitle"></h1>
          <p class="hero-text" id="heroText"></p>
          <div class="hero-actions">
            <a class="primary-btn" href="catalog.html" id="homeCatalogBtn"></a>
            <a class="secondary-btn" href="collection.html" id="homeCollectionBtn"></a>
          </div>
        </div>
        <div class="hero-side">
          <div class="side-card" data-home-panel="0"></div>
          <div class="side-card" data-home-panel="1"></div>
        </div>
      </div>
    </section>

    <section class="page-section">
      <div class="container page-head">
        <h2 class="page-title" id="featuredTitle"></h2>
        <p class="page-text" id="featuredText"></p>
      </div>
      <div class="container stat-grid" id="homeStats"></div>
    </section>

    <section class="page-section">
      <div class="container catalog-grid" id="homePicks"></div>
    </section>

    <section class="page-section">
      <div class="container page-head">
        <h2 class="page-title" id="notesTitle"></h2>
        <p class="page-text" id="notesText"></p>
      </div>
      <div class="container faq-grid" id="homeFaq"></div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="data/config.js"></script>
  <script src="data/tables.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
