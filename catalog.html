<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog — Horror Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="header"></div>
  <main class="page">
    <section class="banner">
      <div class="container banner-box catalog-banner">
        <h1 class="banner-title" id="catalogTitle"></h1>
        <p class="banner-text" id="catalogLead"></p>
      </div>
    </section>
    <section class="page-section">
      <div class="container section-box">
        <div class="filter-row">
          <input class="control search-input" id="searchInput" type="text">
          <select class="control" id="genreSelect"></select>
          <select class="control" id="sortSelect"></select>
        </div>
      </div>
    </section>
    <section class="page-section">
      <div class="container catalog-grid" id="catalogGrid"></div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="data/config.js"></script>
  <script src="data/tables.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
